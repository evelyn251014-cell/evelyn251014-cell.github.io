<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regirtration Form</title>
</head>
<style>

</style>

<body>
    <h1>Registration Form - Middle School</h1>
    <input type="text" id="fname" name="fname" placeholder="First name:" required>

    <input type="text" id="lname" name="lname" placeholder="Last name:" required>

    <div class="personal">
        <input type="date" id="dob" name="dob" placeholder="Date of Birth:" required>
        <input type="text" id="email" name="email" placeholder="Email Address">
    </div>

    <input type="text" id="address" name="address" placeholder="Homepage URL">

    <h3>Favourite Colors</h3>
    <input type="checkbox" id="color1" name="color1" value="Pink">
    <label for="color1">Pink</label> <br>
    <input type="checkbox" id="color2" name="color2" value="Blue">
    <label for="color2">Blue</label><br>
    <input type="checkbox" id="color3" name="color3" value="Purple">
    <label for="color3">Purple</label><br>
    <input type="checkbox" id="color4" name="color4" value="Others">
    <label for="color4">Green</label><br>

    <textarea id="bio" name="bio" placeholder="Bio/Self Introduction" rows="4" cols="50"></textarea><br>

    <input type="submit" value="submit">
</body>

</html>
