<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exe.2 - flexbox2.html</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(252, 252, 252);
            margin: 50px;
        }

        div.header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        div.navigationbar {
            display: flex;
            font-size: 20px;
            align-items: center;
            gap: 40px;
        }

        div.request {
            border: 1px solid black;
            padding: 20px 30px;
            border-radius: 10px;
        }

        div.content {
            display: flex;
        }

        div.title {
            width: 50%;
            gap: 35px;
        }

        h1 {
            font-size: 60px;
            line-height: 1.5;
        }

        p {
            font-size: 20px;
            line-height: 28px;
        }

        div.image1 {
            display: flex;
            justify-content: center;
            margin-top: 50px;

        }

        button {
            background-color: black;
            color: white;
            border-radius: 14px;
            padding: 20px 35px;
            font-size: 20px;
        }

        div.brands {
            display: flex;
            justify-content: space-between;
            gap: 120px;
            padding: 100px;
            margin-top: 50px;
        }
    </style>
</head>

<body>
    <div>
        <div class="header">
            <div class="logo">
                <img src="images/Logo.png" alt="Postivus" width="100%">
            </div>
            <div class="navigationbar">
                <div class="about">About us</div>
                <div class="services"> Services</div>
                <div class="cases"> Use Cases</div>
                <div class="price">Pricing</div>
                <div class="blog">Blog</div>

                <div class="request">Request a quote</div>
            </div>
        </div>
    </div>
    <div class="content">
        <div class="title">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including
                SE0,
                social media marketing, and content creation.</p>
        </div>
        <div class="booking">
            <button>Book a consultation</button>
        </div>
    </div>
    <div class="image1">
        <img src="images/Illustration.png" alt="illustration" width="600px">
    </div>
    <div class="brands">
        <img src="images/Company logo (1).png" alt="Amazon" width="100%">
        <img src="images/Company logo (2).png " alt="Dribble" width="100%">
        <img src="images/Company logo (3).png" alt="Hubspot" width="100%">
        <img src="images/Company logo (4).png" alt="Notion" width="100%">
        <img src="images/Company logo (5).png" alt="Neflix" width="100%">
        <img src="images/Company logo (6).png " alt="Zoom" width="100%">
    </div>
</body>

</html>
