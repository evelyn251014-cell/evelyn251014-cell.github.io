<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exe.2 - flexbox2.html</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(252, 252, 252);
            padding: 50px;
        }

        div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: 30px;
        }

        div.navigationbar {
            margin: 0 15px;
            gap: 50px;
        }

        div.request {
            border: 1px solid black;
            padding: 20px 30px;
            border-radius: 10px;
            text-align: center;
        }

        div.content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        div.title {
            width: 50%;
        }

        h1 {
            font-size: 60px;
            margin-top: 50px;
        }

        p {
            font-size: 25px;
        }
    </style>
</head>

<body>
    <div>
        <div class="logo">
            <img src="images/Logo.png" alt="Postivus" width="70%">
        </div>
        <div class="navigationbar">
            <div class="about">About us</div>
            <div class="services"> Services</div>
            <div class="cases"> Use Cases</div>
            <div class="price">Pricing</div>
            <div class="blog">Blog</div>

            <div class="request">Request a quote</div>
        </div>
    </div>
    <div class="content">
        <div class="title">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of services
                including
                SE0,
                social media marketing, and content creation.</p>
        </div>
    </div>

    <div class="booking">
        <button>Book a consultation</button>
    </div>
    <div class="image1">
        <img src="images/Illustration.png" alt="illustration" width="500%">
    </div>
    <div class="brands">
        <img src="images/Company logo (1).png" alt="Amazon">
        <img src="images/Company logo (2).png " alt="Dribble">
        <img src="images/Company logo (3).png" alt="Hubspot">
        <img src="images/Company logo (4).png" alt="Notion">
        <img src="images/Company logo (5).png" alt="Neflix">
        <img src="images/Company logo (6).png " alt="Zoom">
    </div>
</body>

</html>
