<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>relative-travel</title>
    <link rel="stylesheet" href="css/relative-travel.css">
</head>

<body>
    <div class="cardlist">
        <div class="card">
            <div class="cardcontainer">
                <div class="img">
                    <img src="images/triptogreece.png" alt="Trip To Greece">
                </div>
                <div class="title">Trip To Greece</div>
                <div class="info">
                    <div class="detail">
                        14-29 June | by Robbin Johnson
                    </div>
                    <div class="icon">
                        <img src="images/leaf.png" alt="Leaf">
                        <img src="images/map.png" alt="Map">
                        <img src="images/location-arrow.png" alt="Location-arrow">
                    </div>
                </div>
                <div class="people">
                    <div class="going">
                        <img src="images/building.png">
                        <div class="peoplegoing"> 24 people going</div>
                    </div>
                    <div class="likes">
                        <img src="images/heart.png" alt="Heart">
                    </div>
                </div>
            </div>

            <div class="ongoing">
                <div class="profile">
                    <img src="images/triptorome.png" alt="Trip to Rome">
                </div>
                <div class="detail">
                    <div class="detailinfo">
                        <div class="subtitle">Ongoing</div>
                        <div class="title">Trip to Rome</div>
                    </div>

                    <div class="percentage">40% completed</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="cardcontainer">
                <div class="img">
                    <img src="images/triptogreece.png" alt="Trip To Greece">
                </div>
                <div class="title">Trip To Greece</div>
                <div class="info">
                    <div class="detail">
                        24-30 September | by Addison Baker
                    </div>
                    <div class="icon">
                        <img src="images/leaf.png" alt="Leaf">
                        <img src="images/map.png" alt="Map">
                        <img src="images/location-arrow.png" alt="Location-arrow">
                    </div>
                </div>
                <div class="people">
                    <div class="going">
                        <img src="images/building.png">
                        <div class="peoplegoing"> 35 people going</div>
                    </div>
                    <div class="likes">
                        <img src="images/heart.png" alt="Heart">
                    </div>
                </div>
            </div>

            <div class="ongoing">
                <div class="profile">
                    <img src="images/triptochina.png" alt="Trip to China">
                </div>
                <div class="detail">
                    <div class="detailinfo">
                        <div class="subtitle">Ongoing</div>
                        <div class="title">Trip to China</div>
                    </div>

                    <div class="percentage">50% completed</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
